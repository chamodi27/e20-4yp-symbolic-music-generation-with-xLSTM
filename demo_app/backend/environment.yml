# environment.yml — Conda environment for running the backend WITHOUT Docker
# Based on the official xlstm environment_pt240cu124.yaml with additional
# packages for MIDI conversion and Flask.
#
# Usage:
#   conda env create -n xlstm-api -f environment.yml
#   conda activate xlstm-api
#   export MODEL_PATH=/path/to/checkpoint-46000-last
#   python app.py

name: xlstm-api
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # CUDA toolkit and C++ compiler (required for sLSTM CUDA kernel compilation)
  - cuda=12.4
  - cuda-nvcc=12.4
  - gxx_linux-64=13.2.0
  - python=3.11
  - pip
  - pytorch=2.4.0
  - pytorch-cuda=12.4
  - cmake
  - ninja
  - cuda-toolkit=12.4
  - cuda-cccl=12.4
  - pip:
    # xLSTM model
    - xlstm==2.0.5
    - safetensors==0.7.0
    - transformers==4.44.0
    - omegaconf==2.3.0
    - dacite==1.9.2
    - numpy==1.23.5
    # MIDI decoding — pinned versions (do not change without testing)
    # NOTE: midiprocessor is NOT listed here because its setup.py imports miditoolkit
    # at build time, so miditoolkit must be installed first.
    # Run setup.sh after creating this environment to install midiprocessor.
    - miditoolkit==0.1.16
    - mido==1.3.3
    - pretty-midi==0.2.11
    - scipy==1.10.1
    - matplotlib==3.7.5
    # Flask API
    - flask>=3.0
    - flask-cors>=4.0
